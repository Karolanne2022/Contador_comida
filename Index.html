<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contador de Comidas</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      color: #2c2c2c;
    }

    .container {
      width: 100%;
      max-width: 980px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(8px);
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 10px;
      color: #d35400;
    }

    .subtitle {
      font-size: 1.05rem;
      color: #6b4e3d;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 22px;
      padding: 22px;
      text-align: center;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.08);
      border: 2px solid #ffe0c7;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.12);
    }

    .emoji {
      font-size: 3.2rem;
      margin-bottom: 12px;
    }

    .card h2 {
      font-size: 1.35rem;
      margin-bottom: 14px;
      color: #44312a;
    }

    .counter {
      font-size: 3rem;
      font-weight: 800;
      color: #e67e22;
      margin: 8px 0 18px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 1.25rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: scale(1.06);
      opacity: 0.92;
    }

    .add {
      background: #2ecc71;
      color: #fff;
    }

    .subtract {
      background: #e74c3c;
      color: #fff;
    }

    .footer-actions {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .reset {
      background: #34495e;
      color: white;
      font-size: 1rem;
      padding: 13px 20px;
    }

    .total-box {
      margin-top: 26px;
      text-align: center;
      background: #fff7ef;
      border-radius: 18px;
      padding: 18px;
      border: 2px dashed #f39c12;
      font-size: 1.25rem;
      font-weight: 700;
      color: #8e5100;
    }

    @media (max-width: 520px) {
      .container {
        padding: 22px;
      }

      .buttons {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>🍽️ Contador de Comidas</h1>
      <p class="subtitle">Suma o resta cada pedido individualmente</p>
    </header>

    <section class="cards">
      <div class="card">
        <div class="emoji">🍣</div>
        <h2>Makis</h2>
        <div class="counter" id="makis">0</div>
        <div class="buttons">
          <button class="subtract" onclick="changeCount('makis', -1)">−</button>
          <button class="add" onclick="changeCount('makis', 1)">+</button>
        </div>
      </div>

      <div class="card">
        <div class="emoji">🍔</div>
        <h2>Hamburguesas</h2>
        <div class="counter" id="hamburguesas">0</div>
        <div class="buttons">
          <button class="subtract" onclick="changeCount('hamburguesas', -1)">−</button>
          <button class="add" onclick="changeCount('hamburguesas', 1)">+</button>
        </div>
      </div>

      <div class="card">
        <div class="emoji">🌮</div>
        <h2>Tacos</h2>
        <div class="counter" id="tacos">0</div>
        <div class="buttons">
          <button class="subtract" onclick="changeCount('tacos', -1)">−</button>
          <button class="add" onclick="changeCount('tacos', 1)">+</button>
        </div>
      </div>

      <div class="card">
        <div class="emoji">🍕</div>
        <h2>Pizzas</h2>
        <div class="counter" id="pizzas">0</div>
        <div class="buttons">
          <button class="subtract" onclick="changeCount('pizzas', -1)">−</button>
          <button class="add" onclick="changeCount('pizzas', 1)">+</button>
        </div>
      </div>

      <div class="card">
        <div class="emoji">🥘</div>
        <h2>Variado</h2>
        <div class="counter" id="variado">0</div>
        <div class="buttons">
          <button class="subtract" onclick="changeCount('variado', -1)">−</button>
          <button class="add" onclick="changeCount('variado', 1)">+</button>
        </div>
      </div>
    </section>

    <div class="total-box">
      Total general: <span id="total">0</span> pedidos
    </div>

    <div class="footer-actions">
      <button class="reset" onclick="resetCounters()">🔄 Reiniciar contadores</button>
    </div>
  </main>

  <script>
    const items = ['makis', 'hamburguesas', 'tacos', 'pizzas', 'variado'];

    function changeCount(id, value) {
      const element = document.getElementById(id);
      let current = parseInt(element.textContent, 10);
      current += value;

      if (current < 0) current = 0;

      element.textContent = current;
      updateTotal();
    }

    function updateTotal() {
      const total = items.reduce((sum, id) => {
        return sum + parseInt(document.getElementById(id).textContent, 10);
      }, 0);
      document.getElementById('total').textContent = total;
    }

    function resetCounters() {
      items.forEach(id => {
        document.getElementById(id).textContent = 0;
      });
      updateTotal();
    }
  </script>
</body>
</html>
